<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Fest 2026</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>Tech Fest 2026</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<header class="hero">
    <h1>Welcome to Tech Fest 2026</h1>
    <p>AVS Engineering College</p>
    <p>1 July 2026 | Dennis Richard Hall</p>
    <a href="#register" class="btn">Register Now</a>
</header>

<section class="countdown">
    <h2>Event Countdown</h2>
    <div id="timer"></div>
</section>

<section id="register">
    <h2>Event Registration</h2>

    <form id="registrationForm">
        <input type="text" id="name" placeholder="Name" required>

        <input type="text" id="regno" placeholder="Register Number" required>

        <input type="text" id="dept" placeholder="Department" required>

        <input type="email" id="email" placeholder="Email" required>

        <input type="tel" id="phone" placeholder="Phone Number" required>

        <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
</section>

<footer>
    <p>Tech Fest 2026 | AVS Engineering College</p>
</footer>

<script src="script.js"></script>

</body>
</html>
